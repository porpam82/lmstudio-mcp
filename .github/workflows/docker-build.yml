name: Build and Push to Docker Hub

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'claude_desktop_config.example.json'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag adicional (ex: v0.2.0). Vai sempre marcar :latest também.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="${{ secrets.DOCKERHUB_USERNAME }}/lmstudio-mcp:latest"
          TAGS="$TAGS,${{ secrets.DOCKERHUB_USERNAME }}/lmstudio-mcp:sha-$SHA_SHORT"
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="$TAGS,${{ secrets.DOCKERHUB_USERNAME }}/lmstudio-mcp:${{ inputs.tag }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
